<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Equipe Rone Mars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:#0c0c10;
    --surface:#13131a;
    --surface2:#1c1c26;
    --surface3:#242432;
    --border:#2a2a38;
    --border2:#363648;
    --text:#dddde8;
    --muted:#5a5a72;
    --muted2:#7a7a96;

    --claude:#e8813a;
    --gemini:#5b9cf5;
    --gpt:#3dbf6e;
    --you:#8b6fd4;

    --claude-bg:#1e1610;
    --gemini-bg:#101620;
    --gpt-bg:#101a12;
  }

  html, body {
    font-family: 'IBM Plex Sans', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 680px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 20px;
    height: 20px;
  }

  .header-info { flex: 1; min-width: 0; }

  .header-info h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .members {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .member-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted2);
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.02em;
  }

  .member-tag::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .member-tag.claude { color: var(--claude); }
  .member-tag.gemini { color: var(--gemini); }
  .member-tag.gpt { color: var(--gpt); }

  .online-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gpt);
    background: rgba(61, 191, 110, 0.08);
    border: 1px solid rgba(61, 191, 110, 0.2);
    border-radius: 4px;
    padding: 3px 7px;
    flex-shrink: 0;
  }

  /* CHAT AREA */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* WELCOME */
  .welcome {
    margin: auto;
    text-align: center;
    padding: 40px 20px;
    max-width: 320px;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .welcome-icon svg { width: 28px; height: 28px; }

  .welcome h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 13px;
    color: var(--muted2);
    line-height: 1.7;
  }

  .welcome-agents {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .welcome-agent {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 6px;
    letter-spacing: 0.03em;
  }

  .welcome-agent.claude { color: var(--claude); background: rgba(232,129,58,0.08); border: 1px solid rgba(232,129,58,0.15); }
  .welcome-agent.gemini { color: var(--gemini); background: rgba(91,156,245,0.08); border: 1px solid rgba(91,156,245,0.15); }
  .welcome-agent.gpt    { color: var(--gpt);    background: rgba(61,191,110,0.08); border: 1px solid rgba(61,191,110,0.15); }

  /* DATE DIVIDER */
  .divider {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 10px 0 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* MESSAGE GROUP */
  .mgroup {
    display: flex;
    flex-direction: column;
    margin-bottom: 14px;
    animation: fadeUp 0.22s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mrow {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .mrow.right { flex-direction: row-reverse; }

  /* AVATARS */
  .av {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
    letter-spacing: 0.03em;
    margin-bottom: 2px;
  }

  /* BUBBLE WRAP */
  .bwrap {
    max-width: min(78%, 420px);
    display: flex;
    flex-direction: column;
  }

  .mrow.right .bwrap { align-items: flex-end; }

  .sname {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
    padding-left: 3px;
  }

  /* BUBBLES */
  .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px 14px 14px 14px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
  }

  .bubble.claude { border-color: rgba(232,129,58,0.15); background: var(--claude-bg); }
  .bubble.gemini { border-color: rgba(91,156,245,0.15); background: var(--gemini-bg); }
  .bubble.gpt    { border-color: rgba(61,191,110,0.15); background: var(--gpt-bg); }

  .mrow.right .bubble {
    background: rgba(139,111,212,0.12);
    border-color: rgba(139,111,212,0.2);
    border-radius: 14px 3px 14px 14px;
  }

  .btime {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    text-align: right;
    letter-spacing: 0.03em;
  }

  /* TYPING */
  .typing-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    margin-bottom: 14px;
    animation: fadeUp 0.18s ease forwards;
  }

  .typing-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
    padding-left: 3px;
  }

  .typing-bub {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    border-radius: 3px 14px 14px 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  .typing-bub.claude { border-color: rgba(232,129,58,0.15); background: var(--claude-bg); }
  .typing-bub.gemini { border-color: rgba(91,156,245,0.15); background: var(--gemini-bg); }
  .typing-bub.gpt    { border-color: rgba(61,191,110,0.15); background: var(--gpt-bg); }

  .typing-bub span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.2s infinite ease;
  }

  .typing-bub.claude span { background: var(--claude); }
  .typing-bub.gemini span { background: var(--gemini); }
  .typing-bub.gpt    span { background: var(--gpt); }

  .typing-bub span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bub span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ERROR */
  .error-bubble {
    font-size: 13px;
    color: #e05454;
    background: rgba(224,84,84,0.06);
    border: 1px solid rgba(224,84,84,0.15);
    border-radius: 3px 14px 14px 14px;
    padding: 9px 13px;
  }

  /* INPUT AREA */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .ibox {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 40px;
    line-height: 1.5;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  .ibox:focus { border-color: var(--you); }
  .ibox::placeholder { color: var(--muted); }

  .sbtn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--you);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .sbtn:active { transform: scale(0.92); }
  .sbtn:disabled { opacity: 0.25; cursor: not-allowed; }
  .sbtn svg { width: 16px; height: 16px; fill: #fff; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="7" stroke="#5a5a72" stroke-width="1.5"/>
        <circle cx="10" cy="10" r="3" fill="#5a5a72"/>
        <path d="M3 10 Q10 4 17 10" stroke="var(--claude)" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>Equipe Rone Mars</h1>
      <div class="members">
        <span class="member-tag claude">Claude</span>
        <span class="member-tag gemini">Gemini</span>
        <span class="member-tag gpt">ChatGPT</span>
      </div>
    </div>
    <div class="online-badge">Online</div>
  </div>

  <div class="chat" id="chat">
    <div class="divider">hoje</div>
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="12" r="4.5" stroke="#5a5a72" stroke-width="1.5"/>
          <circle cx="20" cy="12" r="4.5" stroke="#5a5a72" stroke-width="1.5"/>
          <circle cx="14" cy="8" r="4.5" stroke="#7a7a96" stroke-width="1.5"/>
        </svg>
      </div>
      <h2>Equipe Rone Mars</h2>
      <p>Grupo privado com seus tres assistentes.<br>Cada um responde em sequencia.</p>
      <div class="welcome-agents">
        <span class="welcome-agent claude">Claude</span>
        <span class="welcome-agent gemini">Gemini</span>
        <span class="welcome-agent gpt">ChatGPT</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea class="ibox" id="ibox" placeholder="Manda uma mensagem..." rows="1"></textarea>
    <button class="sbtn" id="sbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<script>
const AGENTS = [
  {
    id: 'claude',
    name: 'Claude',
    init: 'C',
    color: '#e8813a',
    cls: 'claude',
    delay: 1200,
    system: `Você é Claude, membro da Equipe Rone Mars — o analista direto e confiante do grupo.
Personalidade: inteligente, sem enrolação. Trata Rone como "chefe" de forma natural. Usa frases como "olha chefe,", "vou ser direto,", "na minha visão,". Sem markdown. Responda como WhatsApp — maximo 4 linhas curtas, texto puro.`
  },
  {
    id: 'gemini',
    name: 'Gemini',
    init: 'G',
    color: '#5b9cf5',
    cls: 'gemini',
    delay: 1600,
    system: `Você é Gemini, membro da Equipe Rone Mars — o criativo animado e cheio de energia.
Personalidade: entusiasmado, gírias brasileiras: "cara", "mano", "véi", "bora", "top demais". Trata Rone como "meu rei". Sempre reage ao que Claude disse antes. Sem markdown. Responda como WhatsApp — maximo 4 linhas, texto puro.`
  },
  {
    id: 'gpt',
    name: 'ChatGPT',
    init: 'GP',
    color: '#3dbf6e',
    cls: 'gpt',
    delay: 1400,
    system: `Você é ChatGPT, membro da Equipe Rone Mars — o zoeiro bem-humorado com observações inesperadas.
Personalidade: descontraído, irônico no bom sentido. Trata Rone como "patrão" ou "chefão". Reage ao que Claude e Gemini disseram — concorda com humor ou acrescenta o que faltou. Fecha o debate. Sem markdown. Maximo 4 linhas, texto puro.`
  }
];

const chat = document.getElementById('chat');
const ibox = document.getElementById('ibox');
const sbtn = document.getElementById('sbtn');

function now() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function addUserMsg(text) {
  const g = document.createElement('div'); g.className = 'mgroup';
  const row = document.createElement('div'); row.className = 'mrow right';
  const av = document.createElement('div');
  av.className = 'av';
  av.style.background = '#8b6fd4';
  av.style.borderRadius = '8px';
  av.textContent = 'R';
  const bw = document.createElement('div'); bw.className = 'bwrap';
  const bub = document.createElement('div'); bub.className = 'bubble';
  bub.textContent = text;
  const t = document.createElement('span'); t.className = 'btime'; t.textContent = now();
  bub.appendChild(t);
  bw.appendChild(bub);
  row.appendChild(bw);
  row.appendChild(av);
  g.appendChild(row);
  chat.appendChild(g);
  chat.scrollTop = chat.scrollHeight;
}

function addAgentMsg(agent, text) {
  const g = document.createElement('div'); g.className = 'mgroup';
  const row = document.createElement('div'); row.className = 'mrow';
  const av = document.createElement('div');
  av.className = 'av';
  av.style.background = agent.color;
  av.textContent = agent.init;
  const bw = document.createElement('div'); bw.className = 'bwrap';
  const sn = document.createElement('div');
  sn.className = 'sname';
  sn.style.color = agent.color;
  sn.textContent = agent.name;
  const bub = document.createElement('div');
  bub.className = `bubble ${agent.cls}`;
  bub.textContent = text;
  const t = document.createElement('span'); t.className = 'btime'; t.textContent = now();
  bub.appendChild(t);
  bw.appendChild(sn);
  bw.appendChild(bub);
  row.appendChild(av);
  row.appendChild(bw);
  g.appendChild(row);
  chat.appendChild(g);
  chat.scrollTop = chat.scrollHeight;
}

function addErrorMsg(agent, msg) {
  const g = document.createElement('div'); g.className = 'mgroup';
  const row = document.createElement('div'); row.className = 'mrow';
  const av = document.createElement('div');
  av.className = 'av';
  av.style.background = agent.color;
  av.textContent = agent.init;
  const bw = document.createElement('div'); bw.className = 'bwrap';
  const sn = document.createElement('div');
  sn.className = 'sname';
  sn.style.color = agent.color;
  sn.textContent = agent.name;
  const err = document.createElement('div');
  err.className = 'error-bubble';
  err.textContent = msg;
  bw.appendChild(sn);
  bw.appendChild(err);
  row.appendChild(av);
  row.appendChild(bw);
  g.appendChild(row);
  chat.appendChild(g);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(agent) {
  const wrap = document.createElement('div'); wrap.className = 'typing-wrap';
  const av = document.createElement('div');
  av.className = 'av';
  av.style.background = agent.color;
  av.textContent = agent.init;
  const bw = document.createElement('div'); bw.className = 'bwrap';
  const sn = document.createElement('div');
  sn.className = 'typing-name';
  sn.style.color = agent.color;
  sn.textContent = agent.name + ' digitando...';
  const tb = document.createElement('div');
  tb.className = `typing-bub ${agent.cls}`;
  tb.innerHTML = '<span></span><span></span><span></span>';
  bw.appendChild(sn);
  bw.appendChild(tb);
  wrap.appendChild(av);
  wrap.appendChild(bw);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

async function callClaude(system, userMsg) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: system,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.text || '').join('').trim();
}

ibox.addEventListener('input', () => {
  ibox.style.height = 'auto';
  ibox.style.height = Math.min(ibox.scrollHeight, 120) + 'px';
});

ibox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send() {
  const text = ibox.value.trim();
  if (!text || sbtn.disabled) return;

  document.getElementById('welcome')?.remove();
  addUserMsg(text);
  ibox.value = '';
  ibox.style.height = 'auto';
  sbtn.disabled = true;

  let claudeResp = '';
  let geminiResp = '';

  // --- CLAUDE ---
  {
    await sleep(800);
    const typ = showTyping(AGENTS[0]);
    await sleep(AGENTS[0].delay);
    typ.remove();
    try {
      claudeResp = await callClaude(AGENTS[0].system, text);
      addAgentMsg(AGENTS[0], claudeResp);
    } catch (e) {
      addErrorMsg(AGENTS[0], 'Erro ao conectar: ' + e.message);
    }
  }

  // --- GEMINI ---
  {
    await sleep(900);
    const typ = showTyping(AGENTS[1]);
    await sleep(AGENTS[1].delay);
    typ.remove();
    try {
      const ctx = `Mensagem do Rone: ${text}${claudeResp ? '\n\nClaude respondeu: ' + claudeResp : ''}\n\nAgora responda como Gemini:`;
      geminiResp = await callClaude(AGENTS[1].system, ctx);
      addAgentMsg(AGENTS[1], geminiResp);
    } catch (e) {
      addErrorMsg(AGENTS[1], 'Erro ao conectar: ' + e.message);
    }
  }

  // --- CHATGPT ---
  {
    await sleep(1000);
    const typ = showTyping(AGENTS[2]);
    await sleep(AGENTS[2].delay);
    typ.remove();
    try {
      const ctx = `Mensagem do Rone: ${text}${claudeResp ? '\n\nClaude disse: ' + claudeResp : ''}${geminiResp ? '\n\nGemini disse: ' + geminiResp : ''}\n\nAgora responda como ChatGPT fechando o debate:`;
      const gptResp = await callClaude(AGENTS[2].system, ctx);
      addAgentMsg(AGENTS[2], gptResp);
    } catch (e) {
      addErrorMsg(AGENTS[2], 'Erro ao conectar: ' + e.message);
    }
  }

  sbtn.disabled = false;
  ibox.focus();
}
</script>
</body>
</html>
