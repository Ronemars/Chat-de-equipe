<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Equipe Rone">
<link rel="manifest" id="pwa-manifest">
<title>Equipe Rone Mars</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #111318; --surface: #1a1d24; --surface2: #22262f; --surface3: #2a2f3a;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f2f7; --text2: #a8b0c0; --text3: #6b7585;
  --tony: #f97316; --tony-bg: rgba(249,115,22,0.10); --tony-border: rgba(249,115,22,0.22);
  --arle: #e879f9; --arle-bg: rgba(232,121,249,0.10); --arle-border: rgba(232,121,249,0.22);
  --bruce: #38bdf8; --bruce-bg: rgba(56,189,248,0.10); --bruce-border: rgba(56,189,248,0.22);
  --you: #a78bfa; --you-bg: rgba(167,139,250,0.15); --you-border: rgba(167,139,250,0.28);
  --sidebar-w: 260px;
}
html, body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; }
#root { display: flex; height: 100dvh; }
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.25s ease; }
.sidebar-header { padding: 18px 14px 14px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
.new-btn { width: 100%; background: var(--you-bg); border: 1px solid var(--you-border); border-radius: 10px; color: var(--you); font-size: 13px; font-weight: 600; padding: 9px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; font-family: inherit; }
.new-btn:hover { background: rgba(167,139,250,0.22); }
.new-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.5; flex-shrink:0; }
.conv-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 3px; }
.conv-list::-webkit-scrollbar { width: 3px; }
.conv-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.conv-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; transition: background 0.12s; border: 1px solid transparent; min-width: 0; }
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface2); border-color: var(--border2); }
.conv-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-name-input { font-size: 13px; font-weight: 500; color: var(--text); background: var(--surface3); border: 1px solid var(--you); border-radius: 5px; padding: 1px 6px; width: 100%; outline: none; font-family: inherit; }
.conv-preview { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.conv-del { opacity: 0; background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px; border-radius: 5px; transition: opacity 0.15s, color 0.15s; flex-shrink: 0; }
.conv-del svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; display: block; }
.conv-item:hover .conv-del { opacity: 1; }
.conv-del:hover { color: #f87171; }
.conv-footer { padding: 10px 14px 12px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); text-align: center; line-height: 1.5; }
.conv-footer span { color: var(--you); font-weight: 600; }
.sidebar-agents { padding: 12px 12px 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.agent-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px; border-radius: 9px; }
.agent-av { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; overflow: hidden; }
.agent-av img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
.agent-info { flex: 1; min-width: 0; }
.agent-nm { font-size: 12px; font-weight: 600; }
.agent-role { font-size: 10px; color: var(--text3); margin-top: 1px; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 13px 20px; display: flex; align-items: center; gap: 13px; flex-shrink: 0; }
.hamburger { display: none; background: none; border: none; cursor: pointer; color: var(--text2); padding: 4px; border-radius: 7px; }
.hamburger:hover { background: var(--surface2); }
.hamburger svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; display: block; }
.header-logo { width: 40px; height: 40px; border-radius: 12px; background: var(--surface3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.header-info { flex: 1; min-width: 0; }
.header-info h1 { font-size: 15px; font-weight: 700; color: var(--text); }
.hm { display: flex; gap: 10px; margin-top: 3px; flex-wrap: wrap; }
.hm-tag { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; transition: opacity 0.3s; }
.hm-tag::before { content:''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.hm-tag.tony { color: var(--tony); } .hm-tag.arle { color: var(--arle); } .hm-tag.bruce { color: var(--bruce); }
.hm-tag.dimmed { opacity: 0.28; }
.online-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: #4ade80; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.18); border-radius: 6px; padding: 4px 9px; flex-shrink: 0; }
.chat { flex: 1; overflow-y: auto; padding: 22px 22px; display: flex; flex-direction: column; scroll-behavior: smooth; }
.chat::-webkit-scrollbar { width: 5px; }
.chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.welcome { margin: auto; text-align: center; padding: 32px 16px; max-width: 400px; }
.welcome-emoji { font-size: 52px; margin-bottom: 16px; line-height: 1; }
.welcome h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.welcome p { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 22px; }
.welcome-cards { display: flex; flex-direction: column; gap: 9px; text-align: left; }
.wcard { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 12px; border: 1px solid; }
.wcard.tony { background: var(--tony-bg); border-color: var(--tony-border); }
.wcard.arle { background: var(--arle-bg); border-color: var(--arle-border); }
.wcard.bruce { background: var(--bruce-bg); border-color: var(--bruce-border); }
.wc-av { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; overflow: hidden; }
.wc-av img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
.wc-name { font-size: 13px; font-weight: 700; }
.wc-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
.divider { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3); margin: 6px 0 18px; display: flex; align-items: center; gap: 10px; }
.divider::before, .divider::after { content:''; flex:1; height: 1px; background: var(--border); }
.mgroup { display: flex; flex-direction: column; margin-bottom: 14px; animation: fadeUp 0.2s ease forwards; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.mrow { display: flex; align-items: flex-end; gap: 10px; }
.mrow.right { flex-direction: row-reverse; }
.av { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; margin-bottom: 2px; overflow: hidden; }
.av img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
.bwrap { max-width: min(76%, 520px); display: flex; flex-direction: column; }
.mrow.right .bwrap { align-items: flex-end; }
.sname { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; padding-left: 3px; }
.bubble { padding: 11px 15px; border-radius: 4px 16px 16px 16px; font-size: 14px; line-height: 1.68; word-break: break-word; white-space: pre-wrap; position: relative; border: 1px solid; color: var(--text); }
.mrow.right .bubble { border-radius: 16px 4px 16px 16px; }
.bubble.tony { background: var(--tony-bg); border-color: var(--tony-border); }
.bubble.arle { background: var(--arle-bg); border-color: var(--arle-border); }
.bubble.bruce { background: var(--bruce-bg); border-color: var(--bruce-border); }
.bubble.you { background: var(--you-bg); border-color: var(--you-border); }
.btime { display: block; font-size: 10px; color: var(--text3); margin-top: 5px; text-align: right; }
.file-preview { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 9px; background: rgba(255,255,255,0.05); border: 1px solid var(--border2); margin-bottom: 7px; font-size: 12px; color: var(--text2); }
.file-preview-icon { font-size: 18px; flex-shrink: 0; }
.file-preview-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.reactions { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.mrow.right .reactions { justify-content: flex-end; }
.reaction-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 2px 8px; font-size: 13px; cursor: pointer; transition: transform 0.15s, background 0.15s; display: flex; align-items: center; gap: 3px; }
.reaction-btn:hover { background: var(--surface3); transform: scale(1.1); }
.reaction-btn span { font-size: 10px; color: var(--text3); font-weight: 600; }
.error-bubble { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: #fca5a5; border-radius: 4px 16px 16px 16px; padding: 10px 14px; font-size: 13px; line-height: 1.5; }
.typing-wrap { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 14px; }
.typing-name { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; padding-left: 3px; }
.typing-bub { padding: 12px 16px; border-radius: 4px 16px 16px 16px; border: 1px solid; display: inline-flex; gap: 5px; align-items: center; }
.typing-bub.tony { background: var(--tony-bg); border-color: var(--tony-border); }
.typing-bub.arle { background: var(--arle-bg); border-color: var(--arle-border); }
.typing-bub.bruce { background: var(--bruce-bg); border-color: var(--bruce-border); }
.typing-bub span { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); animation: blink 1.2s infinite; }
.typing-bub span:nth-child(2) { animation-delay: 0.2s; }
.typing-bub span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2;transform:scale(0.85)} 40%{opacity:1;transform:scale(1)} }
.input-area { padding: 10px 20px 14px; background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
.attach-preview { display: none; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; font-size: 12px; color: var(--text2); }
.attach-preview.visible { display: flex; }
.attach-preview-icon { font-size: 16px; }
.attach-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-remove { background: none; border: none; cursor: pointer; color: var(--text3); padding: 2px 4px; border-radius: 4px; font-size: 14px; line-height: 1; }
.attach-remove:hover { color: #f87171; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-hint { font-size: 10px; color: var(--text3); text-align: center; opacity: 0.6; }
.ibox { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 16px; color: var(--text); font-family: inherit; font-size: 14px; padding: 12px 18px; resize: none; max-height: 130px; min-height: 46px; line-height: 1.55; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.ibox::placeholder { color: var(--text3); }
.ibox:focus { border-color: var(--you); box-shadow: 0 0 0 3px rgba(167,139,250,0.12); }
.attach-btn { width: 46px; height: 46px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; color: var(--text3); }
.attach-btn:hover { background: var(--surface3); color: var(--text2); }
.attach-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
.mic-btn { width: 46px; height: 46px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; color: var(--text3); }
.mic-btn:hover { background: var(--surface3); color: var(--text2); }
.mic-btn.listening { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; animation: micPulse 1s infinite; }
.mic-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0)} }
.action-card { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border2); margin-top: 6px; cursor: pointer; transition: background 0.15s; user-select: none; }
.action-card:hover { background: var(--surface3); }
.action-card-icon { font-size: 18px; flex-shrink: 0; }
.action-card-label { font-size: 13px; color: var(--text2); flex: 1; }
.action-card-btn { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; border: none; cursor: pointer; background: var(--you-bg); color: var(--you); border: 1px solid var(--you-border); }
.notif-bar { display: none; align-items: center; gap: 10px; padding: 8px 14px; background: rgba(167,139,250,0.08); border-bottom: 1px solid rgba(167,139,250,0.18); font-size: 12px; color: var(--text2); cursor: pointer; }
.notif-bar.show { display: flex; }
.notif-bar-icon { font-size: 16px; }
.pref-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); margin: 2px; }
.prefs-row { padding: 6px 14px 2px; display: flex; flex-wrap: wrap; gap: 2px; min-height: 0; }
.sbtn { width: 46px; height: 46px; border-radius: 14px; background: var(--you); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(167,139,250,0.35); }
.sbtn:hover { opacity: 0.88; box-shadow: 0 4px 14px rgba(167,139,250,0.45); }
.sbtn:active { transform: scale(0.93); }
.sbtn:disabled { opacity: 0.28; cursor: not-allowed; box-shadow: none; }
.sbtn svg { width: 17px; height: 17px; fill: #fff; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 10; }
@media (max-width: 680px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 20; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .overlay.show { display: block; }
  .hamburger { display: flex; }
  .chat { padding: 16px 14px; }
  .input-area { padding: 8px 14px 12px; }
  .header { padding: 11px 14px; }
}
</style>
</head>
<body>
<div id="root">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Conversas</div>
      <button class="new-btn" onclick="newChat()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nova conversa
      </button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="conv-footer">Conversas: <span id="convCount">0</span> / 5</div>
    <div class="sidebar-agents">
      <div class="agent-row">
        <div class="agent-av" style="background:#f97316;"><img src="https://ca-times.brightspotcdn.com/dims4/default/e93d82e/2147483647/strip/true/crop/3000x2000+0+0/resize/1200x800!/quality/75/?url=https%3A%2F%2Fcalifornia-times-brightspot.s3.amazonaws.com%2Ff6%2Ff2%2Fada36e394ddeaa69bf4706fd378a%2Firon-man-robert-downey-jr.jpg" alt="Tony" onerror="this.parentElement.textContent='TN'"></div>
        <div class="agent-info"><div class="agent-nm" style="color:var(--tony);">Tony</div><div class="agent-role">Homem de Ferro · Lógica</div></div>
      </div>
      <div class="agent-row">
        <div class="agent-av" style="background:#e879f9;"><img src="https://i.pinimg.com/originals/ed/ee/33/edee33793dd33793771169076ac5a573.jpg" alt="Arlequina" onerror="this.parentElement.textContent='AR'"></div>
        <div class="agent-info"><div class="agent-nm" style="color:var(--arle);">Arlequina</div><div class="agent-role">Caos Genial · Emoção</div></div>
      </div>
      <div class="agent-row">
        <div class="agent-av" style="background:#38bdf8;"><img src="https://c4.wallpaperflare.com/wallpaper/542/571/733/superman-batman-v-superman-dawn-of-justice-batcave-batman-wallpaper-preview.jpg" alt="Bruce" onerror="this.parentElement.textContent='BW'"></div>
        <div class="agent-info"><div class="agent-nm" style="color:var(--bruce);">Bruce</div><div class="agent-role">Batman · Ideias & Mediação</div></div>
      </div>
    </div>
  </aside>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="main">
    <div class="header">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-logo">🦸</div>
      <div class="header-info">
        <h1>Equipe Rone Mars</h1>
        <div class="hm">
          <span class="hm-tag tony" id="tag-tony">Tony</span>
          <span class="hm-tag arle" id="tag-arle">Arlequina</span>
          <span class="hm-tag bruce" id="tag-bruce">Bruce</span>
        </div>
      </div>
      <div class="online-badge">Online</div>
    </div>

    <div class="notif-bar" id="notifBar" onclick="requestNotifPermission()">
      <span class="notif-bar-icon">🔔</span>
      <span>Ativar notificações para lembretes da equipe</span>
      <span style="margin-left:auto;font-weight:700;color:var(--you)">Ativar →</span>
    </div>
    <div class="prefs-row" id="prefsRow"></div>
    <div class="chat" id="chat"></div>

    <div class="input-area">
      <div class="attach-preview" id="attachPreview">
        <span class="attach-preview-icon" id="attachIcon">📄</span>
        <span class="attach-preview-name" id="attachName"></span>
        <button class="attach-remove" onclick="removeAttachment()">✕</button>
      </div>
      <div class="input-row">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Anexar arquivo">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Falar">
          <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.gif,.webp" onchange="handleFileSelect(event)">
        <textarea class="ibox" id="ibox" placeholder="Manda uma mensagem para a equipe..." rows="1"></textarea>
        <button class="sbtn" id="sbtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter para enviar · Shift+Enter para nova linha · 🎤 para falar</div>
    </div>
  </div>
</div>

function loadPrefs(convId) {
  try { return JSON.parse(localStorage.getItem('rone_prefs_'+convId)||'[]'); } catch { return []; }
}
function savePrefs(convId, prefs) {
  localStorage.setItem('rone_prefs_'+convId, JSON.stringify(prefs.slice(-12)));
}
function extractPrefs(text, existingPrefs) {
  const newPrefs = [...existingPrefs];
  const tl = text.toLowerCase();
  const patterns = [
    { re: /\b(prefiro|gosto de|quero|pode ser|me manda|me chama|odeio|não gosto)\s+(.{4,40}?)[\.,!?]/gi, label: m => m[2].trim() },
    { re: /\b(sou|trabalho com|meu projeto|minha empresa|minha stack|uso)\s+(.{4,40}?)[\.,!?\n]/gi, label: m => m[1]+' '+m[2].trim() },
    { re: /\b(me lembra?|lembre(-me)?|não esqueça)\b/i, label: () => 'lembrete solicitado' },
    { re: /\b(curto|odeio)\s+respostas?\s+(curtas?|longas?|detalhadas?)/i, label: m => m[0].trim() },
  ];
  patterns.forEach(p => {
    if (typeof p.label === 'function' && p.re.global) {
      let m; p.re.lastIndex=0;
      while((m=p.re.exec(text))!==null) {
        const label = p.label(m).slice(0,50);
        if (label.length>3 && !newPrefs.includes(label)) newPrefs.push(label);
      }
    } else if (p.re.test && p.re.test(tl)) {
      const label = typeof p.label==='function' ? p.label([tl.match(p.re)]) : p.label;
      if (label && !newPrefs.includes(label)) newPrefs.push(label);
    }
  });
  return newPrefs;
}
function buildPrefsCtx(prefs) {
  if (!prefs.length) return '';
  return `\n\n[Preferências e contexto que Rone já mencionou nesta conversa: ${prefs.join('; ')}. Use isso naturalmente quando relevante — não cite a lista, apenas aplique.]`;
}
function renderPrefsRow(prefs) {
  const row = document.getElementById('prefsRow');
  if (!prefs.length) { row.innerHTML=''; return; }
  row.innerHTML = prefs.slice(-5).map(p=>`<span class="pref-tag">💡 ${esc(p)}</span>`).join('');
}

// ── AÇÕES REAIS (share, clipboard, deeplinks, lembretes) ──
function detectActions(agentText, userText) {
  const actions = [];
  const tl = agentText.toLowerCase();
  const ul = userText.toLowerCase();

  // Copiar conteúdo que o agente gerou
  if (agentText.length > 60 && /\b(aqui|pronto|segue|gerou|criei|escrevi|redigi|texto|mensagem|email|post)\b/.test(tl)) {
    actions.push({ icon:'📋', label:'Copiar resposta', fn: () => copyText(agentText) });
  }

  // Compartilhar
  if (/\b(compartilha|manda|envia|posta|share)\b/.test(ul) || /\b(compartilha|manda|envia)\b/.test(tl)) {
    actions.push({ icon:'📤', label:'Compartilhar', fn: () => shareText(agentText) });
  }

  // WhatsApp
  if (/whatsapp|zap|wpp/.test(ul) || /whatsapp|zap/.test(tl)) {
    const msg = encodeURIComponent(agentText.replace(/^[A-Za-zÀ-ú]+:\s/,'').trim());
    actions.push({ icon:'💬', label:'Abrir WhatsApp', fn: () => window.open(`https://wa.me/?text=${msg}`) });
  }

  // Maps / Localização
  if (/\b(maps|mapa|rota|direção|como chego|endereço|onde fica)\b/.test(ul)) {
    const query = encodeURIComponent(userText.replace(/maps|mapa|rota|como chego|me leva/gi,'').trim());
    actions.push({ icon:'🗺️', label:'Abrir no Maps', fn: () => window.open(`https://maps.google.com/?q=${query}`) });
  }

  // Spotify
  if (/spotify|música|playlist|ouvir/.test(ul)) {
    const query = encodeURIComponent(userText.replace(/spotify|playlist|músic[ao]|ouvir/gi,'').trim());
    actions.push({ icon:'🎵', label:'Buscar no Spotify', fn: () => window.open(`https://open.spotify.com/search/${query}`) });
  }

  // YouTube
  if (/youtube|yt|vídeo|video|assistir/.test(ul)) {
    const query = encodeURIComponent(userText.replace(/youtube|yt|vídeo|video|assistir/gi,'').trim());
    actions.push({ icon:'▶️', label:'Buscar no YouTube', fn: () => window.open(`https://youtube.com/results?search_query=${query}`) });
  }

  // Lembrete
  const reminderMatch = userText.match(/\b(?:me lembra?|lembre(?:-me)?|avisa?(?:-me)?)\s+(?:daqui\s+)?(?:em\s+)?(\d+)\s*(minuto|hora|min|hr)/i);
  if (reminderMatch) {
    const val = parseInt(reminderMatch[1]);
    const unit = reminderMatch[2].toLowerCase();
    const minutes = unit.startsWith('h') ? val*60 : val;
    const agentName = 'Equipe Rone';
    actions.push({ icon:'⏰', label:`Lembrete em ${val} ${unit}(s)`, fn: () => {
      if (scheduleReminder(minutes, `Lembrete: ${userText.replace(/me lembra?.*$/i,'').trim() || 'você pediu um lembrete!'}`, agentName))
        alert(`✅ Lembrete configurado para ${val} ${unit}(s)!`);
    }});
  }

  // Instagram
  if (/instagram|insta/.test(ul)) {
    actions.push({ icon:'📸', label:'Abrir Instagram', fn: () => window.open('https://instagram.com') });
  }

  return actions;
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text.replace(/\s*\d{2}:\d{2}$/,'').trim());
    showToast('📋 Copiado!');
  } catch { showToast('Erro ao copiar'); }
}

async function shareText(text) {
  const clean = text.replace(/\s*\d{2}:\d{2}$/,'').trim();
  if (navigator.share) {
    try { await navigator.share({ text: clean }); } catch(e) { copyText(clean); }
  } else { copyText(clean); }
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t=document.createElement('div'); t.id='toast'; t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#22262f;border:1px solid rgba(255,255,255,0.12);color:#f0f2f7;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.2s;pointer-events:none;'; document.body.appendChild(t); }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',2000);
}

}

let attachedFile = null;
function fileIcon(type, name) {
  if (type.startsWith('image/')) return '🖼️';
  if (type==='application/pdf'||name.endsWith('.pdf')) return '📕';
  if (name.endsWith('.doc')||name.endsWith('.docx')) return '📝';
  if (name.endsWith('.txt')) return '📄';
  return '📎';
}
function handleFileSelect(ev) {
  const file = ev.target.files[0]; if (!file) return;
  if (file.size > 10*1024*1024) { alert('Arquivo muito grande. Máximo 10MB.'); return; }
  const reader = new FileReader();
  const isImage = file.type.startsWith('image/');
  reader.onload = e => {
    const base64 = e.target.result.split(',')[1];
    attachedFile = { name: file.name, type: file.type, base64, isImage };
    if (!isImage) {
      const tr = new FileReader();
      tr.onload = te => { attachedFile.textContent = te.target.result.slice(0, 12000); };
      tr.readAsText(file);
    }
    document.getElementById('attachName').textContent = file.name;
    document.getElementById('attachIcon').textContent = fileIcon(file.type, file.name);
    document.getElementById('attachPreview').classList.add('visible');
  };
  reader.readAsDataURL(file);
  ev.target.value = '';
}
function removeAttachment() {
  attachedFile = null;
  document.getElementById('attachPreview').classList.remove('visible');
  document.getElementById('attachName').textContent = '';
}

// ── FOCO AUTO-DETECTADO ──
function detectFocus(text, prevMessages) {
  const tl = text.toLowerCase();
  const mentions = {
    tony:  /\btony\b/.test(tl),
    arle:  /\b(arlequina|arle)\b/.test(tl),
    bruce: /\bbruce\b/.test(tl)
  };
  const anyMention = mentions.tony || mentions.arle || mentions.bruce;
  if (anyMention) return AGENTS.filter(a => mentions[a.id]).map(a => a.id);

  // Verifica foco mantido: se últimas 2+ msgs do usuário mencionaram sempre o mesmo agente
  const lastUserMsgs = prevMessages.filter(m => m.role==='user').slice(-3);
  if (lastUserMsgs.length >= 2) {
    const lastAgentMsgs = prevMessages.filter(m => m.role==='agent').slice(-4);
    const uniqueAgents = [...new Set(lastAgentMsgs.map(m => m.agent))];
    if (uniqueAgents.length === 1) {
      const fid = uniqueAgents[0];
      const wasMentioned = lastUserMsgs.some(m => {
        const ml = m.text.toLowerCase();
        return (fid==='tony' && /\btony\b/.test(ml)) ||
               (fid==='arle' && /\b(arlequina|arle)\b/.test(ml)) ||
               (fid==='bruce' && /\bbruce\b/.test(ml));
      });
      if (wasMentioned) return [fid];
    }
  }
  return ['tony','arle','bruce'];
}

  if (convs.length>=MAX_CONVS) { alert('Limite de 5 conversas atingido!'); return; }
  const id='c'+Date.now();
  convs.push({id, name:'Nova conversa', emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)], preview:'', messages:[]});
  saveConvs(convs); switchConv(id); closeSidebar();
}
function switchConv(id) { activeId=id; saveActive(id); renderConvList(); renderChat(); updateFocusUI(['tony','arle','bruce']); renderPrefsRow(loadPrefs(id)); }
function deleteConv(id, e) {
  e.stopPropagation();
  if (!confirm('Excluir esta conversa?')) return;
  convs=convs.filter(c=>c.id!==id);
  if (activeId===id) { activeId=convs.length?convs[convs.length-1].id:null; saveActive(activeId); }
  saveConvs(convs); renderConvList(); renderChat();
}
function getActive() { return convs.find(c=>c.id===activeId)||null; }
function updateMeta(cid, txt) {
  const conv=convs.find(c=>c.id===cid); if(!conv) return;
  conv.preview=txt.slice(0,48)+(txt.length>48?'…':'');
  if (conv.messages.filter(m=>m.role==='user').length<=1) conv.name=txt.slice(0,30)+(txt.length>30?'…':'');
  saveConvs(convs); renderConvList();
}

// ── HISTÓRICO ──
function buildHistory(msgs) {
  const lines = msgs.map(m => m.role==='user'
    ? `Rone: ${m.text}${m.fileName?` [arquivo: ${m.fileName}]`:''}`
    : `${m.agent==='tony'?'Tony':m.agent==='arle'?'Arlequina':'Bruce'}: ${m.text}`
  );
  let total=0; const kept=[];
  for (let i=lines.length-1;i>=0;i--) { total+=lines[i].length; if(total>MAX_HIST_CHARS) break; kept.unshift(lines[i]); }
  return kept.join('\n');
}

// ── CONTEXTO EMOCIONAL ──
function buildEmoCtx(msgs, txt) {
  if (!msgs.length) return '';
  const all = (msgs.slice(-6).filter(m=>m.role==='user').map(m=>m.text).join(' ')+' '+txt).toLowerCase();
  const hints = [];

  // Humor do Rone
  if (/\b(não sei|confuso|perdido|difícil|complicado|trava|erro|bug|problema|ajuda|não consigo|tentei)\b/.test(all))
    hints.push('Rone parece frustrado — seja atencioso e prático, não genérico.');
  else if (/\b(ótimo|incrível|show|perfeito|funcionou|consegui|feliz|animado|amei|adorei)\b/.test(all))
    hints.push('Rone está animado — combine com o tom, celebre junto.');
  else if (/\b(urgente|rápido|preciso agora|prazo|deadline|hoje|corre|correndo)\b/.test(all))
    hints.push('Rone está com urgência — seja direto, sem enrolação.');
  else if (/\?/.test(txt) && txt.length < 80)
    hints.push('Pergunta direta e curta — responda na mesma medida.');

  // Tipo de assunto
  if (/\b(código|programar|função|api|banco|deploy|git|script|sistema|app|bug|erro|debug|stack|framework|react|python|javascript|sql)\b/.test(all))
    hints.push('Assunto técnico: Tony lidera, outros complementam com ângulos diferentes — segurança, impacto humano, estratégia.');
  else if (/\b(negócio|vender|cliente|marketing|produto|empresa|dinheiro|projeto|meta|resultado|receita|mercado)\b/.test(all))
    hints.push('Assunto de negócios: Bruce analisa riscos, Tony vai pro objetivo, Arlequina pensa nas pessoas envolvidas.');
  else if (/\b(sentir|emoção|relação|vida|família|amor|medo|ansiedade|triste|feliz|sozinho|relacionamento)\b/.test(all))
    hints.push('Assunto emocional: Arlequina lidera com empatia, Bruce surpreende com uma frase certeira, Tony tenta mas vai pro prático.');
  else if (/\b(ideia|criar|inventar|solução|pensar|plano|visão|conceito|projeto novo|startup|inovar)\b/.test(all))
    hints.push('Assunto criativo: Arlequina entra em modo explosão, Tony traz a lógica, Bruce é o cético construtivo.');

  return hints.length ? `\n\n[Contexto: ${hints.join(' ')}]` : '';
}

// ── PESQUISA WEB ──
function needsSearch(txt) {
  return /\b(pesquisa|pesquise|busca|busque|procura|procure|search|google|internet|web|atual|recente|hoje|agora|notícia|noticia|preço|preco|valor|cotação|cotacao|clima)\b/i.test(txt)
    || /\b(o que é|o que foi|quem é|quem foi|quando foi|onde fica|como funciona|qual é|quantos|quantas)\b/i.test(txt);
}

// ── REAÇÕES ──
const REACTION_EMOJIS = ['👍','❤️','😂','🔥','🤯'];
function maybeAddReactions(bub) {
  if (Math.random()>0.25) return;
  const n = Math.random()<0.3?2:1;
  const chosen = [...REACTION_EMOJIS].sort(()=>Math.random()-0.5).slice(0,n);
  const div = document.createElement('div'); div.className='reactions';
  chosen.forEach(em => {
    const btn = document.createElement('button'); btn.className='reaction-btn';
    const cnt = document.createElement('span'); cnt.textContent=Math.random()<0.4?String(Math.floor(Math.random()*3)+2):'';
    btn.textContent=em; btn.appendChild(cnt);
    btn.addEventListener('click',()=>{btn.style.transform='scale(1.3)';setTimeout(()=>btn.style.transform='',200);});
    div.appendChild(btn);
  });
  bub.parentElement.appendChild(div);
}

// ── RENDER CHAT ──
function renderChat() {
  const chatEl=document.getElementById('chat'); chatEl.innerHTML='';
  const conv=getActive();
  if (!conv) {
    chatEl.innerHTML=`<div class="welcome"><div class="welcome-emoji">🦸</div><h2>Equipe Rone Mars</h2><p>Seu grupo privado com três assistentes únicos.<br>Crie uma conversa para começar.</p><div class="welcome-cards"><div class="wcard tony"><div class="wc-av" style="background:#f97316"><img src="${TONY_IMG}" alt="Tony" onerror="this.parentElement.textContent='TN'"></div><div><div class="wc-name" style="color:var(--tony)">Tony — Homem de Ferro</div><div class="wc-desc">Lógico, direto e genial. Resolve tudo na base da tecnologia.</div></div></div><div class="wcard arle"><div class="wc-av" style="background:#e879f9"><img src="${ARLE_IMG}" alt="Arlequina" onerror="this.parentElement.textContent='AR'"></div><div><div class="wc-name" style="color:var(--arle)">Arlequina — Caos Genial</div><div class="wc-desc">Emotiva e imprevisível. Pensa no lado humano de tudo.</div></div></div><div class="wcard bruce"><div class="wc-av" style="background:#38bdf8"><img src="${BRUCE_IMG}" alt="Bruce" onerror="this.parentElement.textContent='BW'"></div><div><div class="wc-name" style="color:var(--bruce)">Bruce — O Detetive</div><div class="wc-desc">Analítico e cheio de insights. Sempre acha o que faltou.</div></div></div></div></div>`;
    return;
  }
  if (!conv.messages.length) {
    chatEl.innerHTML=`<div class="welcome"><div class="welcome-emoji">${conv.emoji}</div><h2>${esc(conv.name)}</h2><p>A equipe está pronta.<br>Manda sua primeira mensagem!</p></div>`;
    return;
  }
  const d=document.createElement('div'); d.className='divider'; d.textContent='hoje'; chatEl.appendChild(d);
  conv.messages.forEach(msg => {
    if (msg.role==='user') addUserEl(msg.text, msg.time, false, msg.fileName, msg.fileIcon);
    else { const a=AGENTS.find(x=>x.id===msg.agent); if(a) addAgentEl(a, msg.text, msg.time, false, false); }
  });
  chatEl.scrollTop=chatEl.scrollHeight;
}

// ── DOM HELPERS ──
function now() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function addUserEl(text, time, anim=true, fileName=null, fIcon=null) {
  const chatEl=document.getElementById('chat');
  const g=document.createElement('div'); g.className='mgroup'; if(!anim) g.style.animation='none';
  const row=document.createElement('div'); row.className='mrow right';
  const av=document.createElement('div'); av.className='av'; av.style.background='#a78bfa'; av.textContent='R';
  const bw=document.createElement('div'); bw.className='bwrap';
  const bub=document.createElement('div'); bub.className='bubble you';
  if (fileName) {
    const fp=document.createElement('div'); fp.className='file-preview';
    fp.innerHTML=`<span class="file-preview-icon">${fIcon||'📎'}</span><span class="file-preview-name">${esc(fileName)}</span>`;
    bub.appendChild(fp);
  }
  bub.appendChild(document.createTextNode(text));
  const t=document.createElement('span'); t.className='btime'; t.textContent=time;
  bub.appendChild(t); bw.appendChild(bub); row.appendChild(bw); row.appendChild(av); g.appendChild(row);
  chatEl.appendChild(g); chatEl.scrollTop=chatEl.scrollHeight;
}

function addAgentEl(agent, text, time, anim=true, withSound=true, userText='') {
  const chatEl=document.getElementById('chat');
  const g=document.createElement('div'); g.className='mgroup'; if(!anim) g.style.animation='none';
  const row=document.createElement('div'); row.className='mrow';
  const av=document.createElement('div'); av.className='av'; av.style.background=agent.color;
  av.innerHTML=agent.img?`<img src="${agent.img}" alt="${agent.init}" onerror="this.parentElement.textContent='${agent.init}'">`:agent.init;
  const bw=document.createElement('div'); bw.className='bwrap';
  const sn=document.createElement('div'); sn.className='sname'; sn.style.color=agent.color; sn.textContent=agent.name;
  const bub=document.createElement('div'); bub.className=`bubble ${agent.cls}`; bub.textContent=text;
  const t=document.createElement('span'); t.className='btime'; t.textContent=time;
  bub.appendChild(t); bw.appendChild(sn); bw.appendChild(bub);

  // Action cards
  if (userText && withSound) {
    const acts = detectActions(text, userText);
    acts.forEach(act => {
      const card = document.createElement('div'); card.className='action-card';
      card.innerHTML=`<span class="action-card-icon">${act.icon}</span><span class="action-card-label">${act.label}</span><button class="action-card-btn">Executar</button>`;
      card.querySelector('button').addEventListener('click', e => { e.stopPropagation(); act.fn(); });
      bw.appendChild(card);
    });
  }

  row.appendChild(av); row.appendChild(bw); g.appendChild(row);
  chatEl.appendChild(g); chatEl.scrollTop=chatEl.scrollHeight;
  if(withSound) setTimeout(playReceive,80);
  setTimeout(()=>maybeAddReactions(bub),600);
}

function addErrEl(agent, msg) {
  const chatEl=document.getElementById('chat');
  const g=document.createElement('div'); g.className='mgroup';
  const row=document.createElement('div'); row.className='mrow';
  const av=document.createElement('div'); av.className='av'; av.style.background=agent.color;
  av.innerHTML=agent.img?`<img src="${agent.img}" alt="${agent.init}" onerror="this.parentElement.textContent='${agent.init}'">`:agent.init;
  const bw=document.createElement('div'); bw.className='bwrap';
  const sn=document.createElement('div'); sn.className='sname'; sn.style.color=agent.color; sn.textContent=agent.name;
  const err=document.createElement('div'); err.className='error-bubble'; err.textContent=msg;
  bw.appendChild(sn); bw.appendChild(err); row.appendChild(av); row.appendChild(bw); g.appendChild(row);
  chatEl.appendChild(g); chatEl.scrollTop=chatEl.scrollHeight;
}

function showTyping(agent) {
  const chatEl=document.getElementById('chat');
  const wrap=document.createElement('div'); wrap.className='typing-wrap';
  const av=document.createElement('div'); av.className='av'; av.style.background=agent.color;
  av.innerHTML=agent.img?`<img src="${agent.img}" alt="${agent.init}" onerror="this.parentElement.textContent='${agent.init}'">`:agent.init;
  const bw=document.createElement('div'); bw.className='bwrap';
  const sn=document.createElement('div'); sn.className='typing-name'; sn.style.color=agent.color; sn.textContent=agent.name+' digitando...';
  const tb=document.createElement('div'); tb.className=`typing-bub ${agent.cls}`; tb.innerHTML='<span></span><span></span><span></span>';
  bw.appendChild(sn); bw.appendChild(tb); wrap.appendChild(av); wrap.appendChild(bw);
  chatEl.appendChild(wrap); chatEl.scrollTop=chatEl.scrollHeight;
  return wrap;
}

// ── API ──
async function callEdge(fn, payload) {
  const res=await fetch(`${SUPABASE_URL}/functions/v1/${fn}`,{
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
    body:JSON.stringify(payload)
  });
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||data.message||'Erro na Edge Function');
  return data.text||'';
}

// ── INPUT ──
const ibox=document.getElementById('ibox');
const sbtn=document.getElementById('sbtn');
ibox.addEventListener('input',()=>{ibox.style.height='auto';ibox.style.height=Math.min(ibox.scrollHeight,130)+'px';});
ibox.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

// ── SEND ──
async function send() {
  const text=ibox.value.trim();
  if (!text && !attachedFile) return;
  if (sbtn.disabled) return;

  const displayText = text || (attachedFile?`[Arquivo: ${attachedFile.name}]`:'');

  if (!getActive()) {
    if (convs.length>=MAX_CONVS) { alert('Limite de 5 conversas!'); return; }
    newChat();
  }

  const conv=getActive();
  const chatEl=document.getElementById('chat');
  const welcome=chatEl.querySelector('.welcome');
  if (welcome) {
    chatEl.innerHTML='';
    const d=document.createElement('div'); d.className='divider'; d.textContent='hoje'; chatEl.appendChild(d);
  }

  const t0=now();
  const msgObj={role:'user', text:displayText, time:t0};
  if (attachedFile) { msgObj.fileName=attachedFile.name; msgObj.fileIcon=fileIcon(attachedFile.type,attachedFile.name); }
  conv.messages.push(msgObj);
  updateMeta(conv.id, displayText);
  addUserEl(displayText, t0, true, msgObj.fileName, msgObj.fileIcon);
  playSend();

  const curFile = attachedFile ? {...attachedFile} : null;
  ibox.value=''; ibox.style.height='auto'; sbtn.disabled=true;
  removeAttachment();

  const hist = buildHistory(conv.messages.slice(0,-1));
  const emoCtx = buildEmoCtx(conv.messages.slice(0,-1), displayText);

  // Preferências
  const prefs = extractPrefs(displayText, loadPrefs(conv.id));
  savePrefs(conv.id, prefs);
  renderPrefsRow(prefs);
  const prefsCtx = buildPrefsCtx(prefs);

  // Contexto do arquivo
  let fileCtx='';
  if (curFile) {
    if (curFile.isImage) fileCtx=`\n\n[Rone enviou uma imagem: "${curFile.name}". Leve em conta na sua resposta.]`;
    else if (curFile.textContent) fileCtx=`\n\n[Rone anexou o arquivo "${curFile.name}". Conteúdo:\n${curFile.textContent.slice(0,4000)}${curFile.textContent.length>4000?'\n...(truncado)':''}]`;
    else fileCtx=`\n\n[Rone anexou o arquivo "${curFile.name}"]`;
  }

  // Contexto pesquisa web
  const webCtx = needsSearch(text) ? '\n\n[Mensagem requer informação atual da internet. Mencione que fez uma pesquisa.]' : '';

  const baseMsg = `Histórico:\n${hist}${emoCtx}${prefsCtx}${fileCtx}${webCtx}\n\nRone disse: "${displayText}"`;

  // Detecta foco
  const focusIds = detectFocus(text, conv.messages.slice(0,-1));
  updateFocusUI(focusIds);

  let tonyR='', arleR='';

  // TONY
  if (focusIds.includes('tony')) {
    await sleep(600);
    const typ=showTyping(AGENTS[0]); await sleep(AGENTS[0].delay); typ.remove();
    try {
      const t=now();
      tonyR=await callEdge(AGENTS[0].fn,{system:AGENTS[0].system, userMsg:baseMsg+'\n\nSua vez, Tony. Seja direto e curto:'});
      conv.messages.push({role:'agent',agent:'tony',text:tonyR,time:t});
      saveConvs(convs); addAgentEl(AGENTS[0],tonyR,t,true,true,displayText);
    } catch(e) { addErrEl(AGENTS[0],'Erro: '+e.message); }
  }

  // ARLEQUINA — vê o que Tony disse
  if (focusIds.includes('arle')) {
    await sleep(700);
    const typ=showTyping(AGENTS[1]); await sleep(AGENTS[1].delay); typ.remove();
    try {
      const t=now();
      const tonyBlock = tonyR ? `\n\nTony acabou de falar: "${tonyR}"` : '';
      arleR=await callEdge(AGENTS[1].fn,{system:AGENTS[1].system,
        userMsg:baseMsg+tonyBlock+'\n\nSua vez, Arlequina. Reaja ao que Tony disse se fizer sentido, mas foque no Rone. Curto e na veia:'
      });
      conv.messages.push({role:'agent',agent:'arle',text:arleR,time:t});
      saveConvs(convs); addAgentEl(AGENTS[1],arleR,t,true,true,displayText);
    } catch(e) { addErrEl(AGENTS[1],'Erro: '+e.message); }
  }

  // BRUCE — vê o que Tony E Arlequina disseram
  if (focusIds.includes('bruce')) {
    await sleep(700);
    const typ=showTyping(AGENTS[2]); await sleep(AGENTS[2].delay); typ.remove();
    try {
      const t=now();
      const othersBlock = [tonyR?`Tony: "${tonyR}"`:null, arleR?`Arlequina: "${arleR}"`:null].filter(Boolean).join('\n');
      const bruceR=await callEdge(AGENTS[2].fn,{system:AGENTS[2].system,
        userMsg:baseMsg+(othersBlock?'\n\nO que os outros falaram:\n'+othersBlock:'')+'\n\nSua vez, Bruce. Se já cobriram tudo, uma linha resolve. Não repita nada do que foi dito:'
      });
      conv.messages.push({role:'agent',agent:'bruce',text:bruceR,time:t});
      saveConvs(convs); addAgentEl(AGENTS[2],bruceR,t,true,true,displayText);
    } catch(e) { addErrEl(AGENTS[2],'Erro: '+e.message); }
  }

  setTimeout(()=>updateFocusUI(['tony','arle','bruce']),2000);

  // Interação espontânea entre agentes (35% de chance quando os 3 responderam)
  const allThreeActive = focusIds.includes('tony') && focusIds.includes('arle') && focusIds.includes('bruce');
  if (allThreeActive && tonyR && arleR && Math.random() < 0.35) {
    await sleep(1600);
    // Escolhe quem reage: Tony, Arle ou Bruce — com pesos diferentes
    const roll = Math.random();
    let reactor, reactorPrompt;
    if (roll < 0.38) {
      // Tony reage à Arlequina
      reactor = AGENTS[0];
      reactorPrompt = `Arlequina acabou de falar no grupo: "${arleR}"\n\nMande UMA linha como Tony reagiria — pode ser irônico, concordar, discordar com humor ou ignorar com graça. Só uma linha, sem explicação.`;
    } else if (roll < 0.72) {
      // Arlequina reage ao Tony
      reactor = AGENTS[1];
      reactorPrompt = `Tony acabou de falar no grupo: "${tonyR}"\n\nMande UMA linha como Arlequina reagiria — pode ser apaixonada, provocar com carinho, discordar com drama ou concordar animada. Só uma linha, sem explicação.`;
    } else {
      // Bruce reage a um dos dois (escolhe aleatoriamente)
      reactor = AGENTS[2];
      const bruceTarget = Math.random() < 0.5 ? `Tony: "${tonyR}"` : `Arlequina: "${arleR}"`;
      reactorPrompt = `${bruceTarget}\n\nMande UMA linha como Bruce reagiria — pode ser concordância seca, discordância firme, ou uma observação pontual. Só uma linha, direto.`;
    }
    const typ2 = showTyping(reactor); await sleep(850); typ2.remove();
    try {
      const t2 = now();
      const reactR = await callEdge(reactor.fn, { system: reactor.system, userMsg: reactorPrompt });
      conv.messages.push({role:'agent', agent:reactor.id, text:reactR, time:t2});
      saveConvs(convs); addAgentEl(reactor, reactR, t2, true, true);
    } catch(e) {}
  }

  sbtn.disabled=false; ibox.focus();
}

// ── INIT ──
if (!activeId||!convs.find(c=>c.id===activeId)) { activeId=null; saveActive(null); }
checkNotifBar();
renderConvList();
renderChat();
// Renderiza prefs da conversa ativa se existir
if (activeId) renderPrefsRow(loadPrefs(activeId));
</script>
</body>
</html>
