<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Equipe Rone Mars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0f0f13; --surface:#1a1a22; --surface2:#22222e; --border:#2e2e3e;
    --text:#e8e8f0; --muted:#7a7a96;
    --claude:#f97316; --gemini:#4f9cf9; --gpt:#22c55e; --you:#a78bfa;
  }
  html,body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); height:100%; overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100dvh; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .group-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--claude),var(--gemini),var(--gpt)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .header-info h1 { font-size:15px; font-weight:700; }
  .members { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:10px; }
  .members span { display:inline-flex; align-items:center; gap:4px; }
  .dot { width:6px; height:6px; border-radius:50%; }
  .keys-btn { margin-left:auto; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:7px 12px; color:var(--muted); font-size:12px; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .kdot { width:7px; height:7px; border-radius:50%; background:var(--border); transition:background 0.3s; }
  .kdot.on { background:#22c55e; }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; display:none; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:20px 20px 0 0; padding:20px 20px 40px; width:100%; max-width:480px; border-top:1px solid var(--border); }
  .handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
  .modal h2 { font-size:15px; font-weight:700; margin-bottom:16px; }
  .mkg { margin-bottom:12px; }
  .mkg label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; }
  .key-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:13px; font-family:monospace; outline:none; }
  .key-input:focus { border-color:var(--you); }
  .msave { width:100%; margin-top:4px; background:var(--you); border:none; border-radius:12px; padding:13px; color:#fff; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .chat { flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:2px; -webkit-overflow-scrolling:touch; }
  .chat::-webkit-scrollbar { display:none; }
  .divider { text-align:center; font-size:11px; color:var(--muted); margin:8px 0 6px; display:flex; align-items:center; gap:8px; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .mgroup { display:flex; flex-direction:column; gap:2px; margin-bottom:6px; animation:up 0.2s ease; }
  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .mrow { display:flex; align-items:flex-end; gap:8px; }
  .mrow.right { flex-direction:row-reverse; }
  .av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; color:#fff; margin-bottom:2px; }
  .bwrap { max-width:min(80%,400px); display:flex; flex-direction:column; }
  .mrow.right .bwrap { align-items:flex-end; }
  .sname { font-size:11px; font-weight:600; margin-bottom:3px; padding-left:2px; }
  .bubble { background:var(--surface2); border-radius:4px 16px 16px 16px; padding:9px 13px; font-size:14px; line-height:1.55; border:1px solid var(--border); word-break:break-word; white-space:pre-wrap; }
  .mrow.right .bubble { background:#2d2040; border-color:#3d2f5a; border-radius:16px 4px 16px 16px; }
  .btime { display:block; font-size:10px; color:var(--muted); margin-top:4px; text-align:right; }
  .typing-bub { background:var(--surface2); border:1px solid var(--border); border-radius:4px 16px 16px 16px; padding:11px 14px; display:inline-flex; align-items:center; gap:4px; }
  .typing-bub span { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:bounce 1.1s infinite; }
  .typing-bub span:nth-child(2){animation-delay:0.18s} .typing-bub span:nth-child(3){animation-delay:0.36s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }
  .welcome { text-align:center; padding:40px 24px; color:var(--muted); }
  .welcome .em { font-size:44px; margin-bottom:14px; }
  .welcome h2 { font-size:16px; color:var(--text); font-weight:700; margin-bottom:8px; }
  .welcome p { font-size:13px; line-height:1.7; }
  .welcome .hint { margin-top:16px; font-size:12px; background:var(--surface2); border-radius:10px; padding:10px 14px; border:1px solid var(--border); }
  .input-area { background:var(--surface); border-top:1px solid var(--border); padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom)); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
  .ibox { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:15px; resize:none; outline:none; max-height:100px; min-height:42px; line-height:1.4; overflow-y:auto; }
  .ibox:focus { border-color:var(--you); }
  .ibox::placeholder { color:var(--muted); }
  .sbtn { width:42px; height:42px; border-radius:50%; background:var(--you); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.2s,transform 0.1s; }
  .sbtn:active { transform:scale(0.9); opacity:0.8; }
  .sbtn:disabled { opacity:0.3; cursor:not-allowed; }
  .sbtn svg { width:18px; height:18px; fill:#fff; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="group-avatar">🚀</div>
    <div class="header-info">
      <h1>Equipe Rone Mars</h1>
      <div class="members">
        <span><span class="dot" style="background:var(--claude)"></span>Claude</span>
        <span><span class="dot" style="background:var(--gemini)"></span>Gemini</span>
        <span><span class="dot" style="background:var(--gpt)"></span>ChatGPT</span>
      </div>
    </div>
    <button class="keys-btn" onclick="openModal()">
      🔑 <div class="kdot" id="kc"></div><div class="kdot" id="kg"></div><div class="kdot" id="ko"></div>
    </button>
  </div>

  <div class="chat" id="chat">
    <div class="divider">hoje</div>
    <div class="welcome" id="welcome">
      <div class="em">👥</div>
      <h2>Equipe Rone Mars</h2>
      <p>Seu grupo particular com Claude, Gemini e ChatGPT.<br>Cada um responde do seu jeito, em cadeia.</p>
      <div class="hint">✅ Chaves configuradas — pode mandar ver!</div>
    </div>
  </div>

  <div class="input-area">
    <textarea class="ibox" id="ibox" placeholder="Manda uma mensagem..." rows="1"></textarea>
    <button class="sbtn" id="sbtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

</div>

<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <div class="handle"></div>
    <h2>🔑 Chaves de API</h2>
    <div class="mkg">
      <label style="color:var(--claude)">Claude — Anthropic</label>
      <input class="key-input" id="ka" type="password" placeholder="sk-ant-...">
    </div>
    <div class="mkg">
      <label style="color:var(--gemini)">Gemini — Google</label>
      <input class="key-input" id="kg2" type="password" placeholder="AIza...">
    </div>
    <div class="mkg">
      <label style="color:var(--gpt)">ChatGPT — OpenAI</label>
      <input class="key-input" id="ko2" type="password" placeholder="sk-...">
    </div>
    <button class="msave" onclick="saveKeys()">Salvar e fechar</button>
  </div>
</div>

<script>
// ── CHAVES EMBUTIDAS (fallback) ────────────────────────────────────────────
const DEFAULT = {
  a: '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',
  g: 'AIzaSyAJSnI4hwsjTGVjgMbVjHPNakKevk6LCj8',
  o: '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'
};

// localStorage sobrescreve os defaults se o usuário salvar novas chaves
let keys = {
  a: localStorage.getItem('erm_ka') || DEFAULT.a,
  g: localStorage.getItem('erm_kg') || DEFAULT.g,
  o: localStorage.getItem('erm_ko') || DEFAULT.o
};

// ── AGENTES ────────────────────────────────────────────────────────────────
const AGENTS = [
  {
    id:'claude', name:'Claude', color:'#f97316', init:'C',
    system:`Você é Claude, membro da Equipe Rone Mars — o analista confiante e direto do grupo.
Personalidade: inteligente, honesto, sem enrolação. Trata o Rone como "chefe" de forma natural, nunca bajulando. Usa frases como "olha chefe,", "vou ser direto,", "isso tá certo,", "na minha visão,". Sem markdown, sem asterisco, sem negrito. Responda como WhatsApp — máximo 4 linhas curtas.`
  },
  {
    id:'gemini', name:'Gemini', color:'#4f9cf9', init:'G',
    system:`Você é Gemini, membro da Equipe Rone Mars — o criativo animado e cheio de energia.
Personalidade: entusiasmado, gírias brasileiras naturais: "cara", "mano", "véi", "que isso", "bora", "top demais". Trata o Rone como "meu rei". Sempre reage ao que Claude disse. Sem markdown, sem asterisco. Responda como WhatsApp — máximo 4 linhas cheias de energia.`
  },
  {
    id:'gpt', name:'ChatGPT', color:'#22c55e', init:'GP',
    system:`Você é ChatGPT, membro da Equipe Rone Mars — o zoeiro bem-humorado com observações inesperadas.
Personalidade: descontraído, irônico no bom sentido, piadinha leve quando cabe. Trata o Rone como "patrão" ou "chefão". Reage ao que Claude e Gemini disseram — concorda com humor ou acrescenta o que faltou. Sem markdown, sem asterisco. Responda como WhatsApp — máximo 4 linhas. Feche o debate com leveza.`
  }
];

// ── MODAL ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ka').value  = keys.a;
  document.getElementById('kg2').value = keys.g;
  document.getElementById('ko2').value = keys.o;
  updateDots();
});

function saveKeys() {
  keys.a = document.getElementById('ka').value.trim()  || DEFAULT.a;
  keys.g = document.getElementById('kg2').value.trim() || DEFAULT.g;
  keys.o = document.getElementById('ko2').value.trim() || DEFAULT.o;
  localStorage.setItem('erm_ka', keys.a);
  localStorage.setItem('erm_kg', keys.g);
  localStorage.setItem('erm_ko', keys.o);
  updateDots();
  closeModal();
}

function updateDots() {
  document.getElementById('kc').className = 'kdot' + (keys.a ? ' on' : '');
  document.getElementById('kg').className  = 'kdot' + (keys.g ? ' on' : '');
  document.getElementById('ko').className  = 'kdot' + (keys.o ? ' on' : '');
}

function openModal()  { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function outsideClose(e) { if (e.target.id === 'overlay') closeModal(); }

// ── CHAT UI ────────────────────────────────────────────────────────────────
const chat = document.getElementById('chat');
function now() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function addMsg(agent, text, isUser=false) {
  const g   = document.createElement('div'); g.className='mgroup';
  const row = document.createElement('div'); row.className='mrow'+(isUser?' right':'');
  const av  = document.createElement('div'); av.className='av'; av.style.background=agent.color; av.textContent=agent.init;
  const bw  = document.createElement('div'); bw.className='bwrap';
  if (!isUser) {
    const sn = document.createElement('div'); sn.className='sname'; sn.style.color=agent.color; sn.textContent=agent.name;
    bw.appendChild(sn);
  }
  const bub = document.createElement('div'); bub.className='bubble'; bub.textContent=text;
  const t   = document.createElement('span'); t.className='btime'; t.textContent=now();
  bub.appendChild(t); bw.appendChild(bub);
  row.appendChild(isUser ? bw : av);
  row.appendChild(isUser ? av : bw);
  g.appendChild(row); chat.appendChild(g);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping(agent) {
  const g   = document.createElement('div'); g.className='mgroup';
  const row = document.createElement('div'); row.className='mrow';
  const av  = document.createElement('div'); av.className='av'; av.style.background=agent.color; av.textContent=agent.init;
  const bw  = document.createElement('div'); bw.className='bwrap';
  const sn  = document.createElement('div'); sn.className='sname'; sn.style.color=agent.color; sn.textContent=agent.name+' digitando...';
  const tb  = document.createElement('div'); tb.className='typing-bub'; tb.innerHTML='<span></span><span></span><span></span>';
  bw.appendChild(sn); bw.appendChild(tb);
  row.appendChild(av); row.appendChild(bw); g.appendChild(row); chat.appendChild(g);
  chat.scrollTop = chat.scrollHeight;
  return g;
}

// ── APIs INDIVIDUAIS ───────────────────────────────────────────────────────
async function callClaude(system, userMsg) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': keys.a,
      'anthropic-version':'2023-06-01'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:300,
      system,
      messages:[{ role:'user', content: userMsg }]
    })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || JSON.stringify(d));
  return d.content[0].text.trim();
}

async function callGemini(system, userMsg) {
  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${keys.g}`,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts:[{ text: system + '\n\n' + userMsg }] }],
        generationConfig:{ maxOutputTokens:300, temperature:0.9 }
      })
    }
  );
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || JSON.stringify(d));
  return d.candidates[0].content.parts[0].text.trim();
}

async function callOpenAI(system, userMsg) {
  const r = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer ' + keys.o
    },
    body: JSON.stringify({
      model:'gpt-4o-mini',
      max_tokens:300,
      messages:[
        { role:'system', content: system },
        { role:'user',   content: userMsg }
      ]
    })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || JSON.stringify(d));
  return d.choices[0].message.content.trim();
}

// ── ENVIO ──────────────────────────────────────────────────────────────────
const ibox = document.getElementById('ibox');
const sbtn = document.getElementById('sbtn');

ibox.addEventListener('input', () => {
  ibox.style.height = 'auto';
  ibox.style.height = Math.min(ibox.scrollHeight, 100) + 'px';
});
ibox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

async function send() {
  const text = ibox.value.trim();
  if (!text || sbtn.disabled) return;
  if (!keys.a && !keys.g && !keys.o) { openModal(); return; }

  document.getElementById('welcome')?.remove();
  addMsg({ name:'Você', color:'#a78bfa', init:'R' }, text, true);
  ibox.value = ''; ibox.style.height = 'auto';
  sbtn.disabled = true;

  let cr = '', gr = '';

  // 1) CLAUDE → Anthropic API
  if (keys.a) {
    const t = addTyping(AGENTS[0]);
    try {
      cr = await callClaude(AGENTS[0].system, text);
      t.remove(); addMsg(AGENTS[0], cr);
    } catch(e) { t.remove(); addMsg(AGENTS[0], '❌ ' + e.message); }
  }

  // 2) GEMINI → Google API
  if (keys.g) {
    const t = addTyping(AGENTS[1]);
    try {
      const msg = `Mensagem do Rone: ${text}${cr ? '\n\nClaude disse: ' + cr : ''}\n\nResponda como Gemini:`;
      gr = await callGemini(AGENTS[1].system, msg);
      t.remove(); addMsg(AGENTS[1], gr);
    } catch(e) { t.remove(); addMsg(AGENTS[1], '❌ ' + e.message); }
  }

  // 3) CHATGPT → OpenAI API
  if (keys.o) {
    const t = addTyping(AGENTS[2]);
    try {
      const msg = `Mensagem do Rone: ${text}${cr ? '\n\nClaude disse: ' + cr : ''}${gr ? '\n\nGemini disse: ' + gr : ''}\n\nResponda como ChatGPT fechando o debate:`;
      const or = await callOpenAI(AGENTS[2].system, msg);
      t.remove(); addMsg(AGENTS[2], or);
    } catch(e) { t.remove(); addMsg(AGENTS[2], '❌ ' + e.message); }
  }

  sbtn.disabled = false;
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
